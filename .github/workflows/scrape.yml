name: Scrape votes

on:
  # Daily scheduling moved to the EU VPS (see deploy/) — cdep.ro blocks GitHub's
  # US/Azure runner IPs, so the cron could never scrape Camera. Manual only now.
  workflow_dispatch:
    inputs:
      date:
        description: "Single date to scrape (YYYY-MM-DD). Leave blank for yesterday."
        required: false
      chamber:
        description: "Which chamber: both | camera | senat"
        required: false
        default: "both"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Set date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "target=${{ github.event.inputs.date }}" >> "$GITHUB_OUTPUT"
          else
            echo "target=$(date -u -d 'yesterday' '+%Y-%m-%d')" >> "$GITHUB_OUTPUT"
          fi

      - name: Scrape Camera Deputaților
        id: camera
        if: ${{ github.event.inputs.chamber != 'senat' }}
        continue-on-error: true
        run: |
          python scraper/camera_scraper.py --date "${{ steps.date.outputs.target }}"

      - name: Scrape Senat
        if: ${{ github.event.inputs.chamber != 'camera' }}
        run: |
          python scraper/senat_scraper.py --date "${{ steps.date.outputs.target }}"

      - name: Fail if Camera errored
        if: ${{ steps.camera.outcome == 'failure' }}
        run: |
          echo "Camera Deputaților scrape failed — cdep.ro may be unreachable from this runner"
          exit 1